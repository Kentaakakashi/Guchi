<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Imposter</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg glow1"></div>
  <div class="bg glow2"></div>

  <main class="wrapper">

    <!-- HOME -->

    <section class="panel" id="homeScreen">

      <div class="hero">

        <div class="logo">
          <div class="logo-dot"></div>
          Pulse Imposter
        </div>

        <h1>
          Multiplayer Imposter
        </h1>

        <p>
          Realtime party game powered by Firebase.
        </p>

      </div>

      <div class="input-box">

        <label>Username</label>

        <input
          id="username"
          maxlength="14"
          type="text"
          placeholder="Enter username"
        />

      </div>

      <button id="createBtn" class="primary-btn">
        Create Lobby
      </button>

      <div class="divider">
        <span>OR JOIN</span>
      </div>

      <div class="input-box">

        <label>Room Code</label>

        <input
          id="roomCode"
          maxlength="6"
          type="text"
          placeholder="Enter room code"
        />

      </div>

      <button id="joinBtn" class="secondary-btn">
        Join Lobby
      </button>

      <p id="errorText"></p>

    </section>


    <!-- LOBBY -->

    <section class="panel hidden" id="lobbyScreen">

      <div class="topbar">

        <div>

          <p class="mini-title">
            ROOM CODE
          </p>

          <h2 id="displayCode">
            ABC123
          </h2>

        </div>

        <button id="copyBtn" class="small-btn">
          Copy
        </button>

      </div>

      <div class="lobby-status">

        <div class="online-status">
          <div class="pulse"></div>
          Live Lobby
        </div>

        <div id="playerCount">
          0/8 Players
        </div>

      </div>

      <div id="playerList"></div>

      <div class="action-grid">

        <button id="readyBtn" class="secondary-btn">
          Ready
        </button>

        <button id="startBtn" class="primary-btn hidden">
          Start Match
        </button>

      </div>

      <button id="leaveBtn" class="danger-btn">
        Leave Lobby
      </button>

    </section>


    <!-- GAME SCREEN -->

    <section class="panel hidden" id="gameScreen">

      <div class="game-title">
        YOUR ROLE
      </div>

      <div id="roleCard" class="role-card">

        <h1 id="roleText">
          CREWMATE
        </h1>

        <p id="wordText">
          WORD
        </p>

      </div>

      <div class="timer-box">

        <div class="mini-title">
          DISCUSSION TIMER
        </div>

        <h1 id="timerDisplay">
          60
        </h1>

      </div>

      <button id="voteBtn" class="primary-btn">
        Go To Voting
      </button>

    </section>


    <!-- VOTING -->

    <section class="panel hidden" id="voteScreen">

      <div class="game-title">
        VOTE THE IMPOSTER
      </div>

      <div id="voteList"></div>

      <div id="voteStatus" class="vote-status">
        Waiting for votes...
      </div>

    </section>


    <!-- RESULT -->

    <section class="panel hidden" id="resultScreen">

      <div class="result-box">

        <h1 id="resultTitle">
          RESULT
        </h1>

        <p id="resultText">
          Result text
        </p>

      </div>

    </section>

  </main>

  <script type="module" src="script.js"></script>

</body>
</html>
